name: web-ci

on:
  push:
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/shared/**"

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run -w packages/shared typecheck
      - run: npm run -w apps/web typecheck
      - run: npm run -w apps/web build

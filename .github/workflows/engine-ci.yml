name: engine-ci

on:
  push:
    paths:
      - "apps/engine/**"
      - ".github/workflows/engine-ci.yml"
  pull_request:
    paths:
      - "apps/engine/**"

jobs:
  engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m compileall .

version: "3.9"
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  engine:
    build:
      context: ./apps/engine
    env_file:
      - ./apps/engine/.env.example
    ports:
      - "8000:8000"
    depends_on:
      - redis

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./:/app
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env.example
